# Compose loads `.env` from this directory automatically — no extra config needed.
# https://docs.docker.com/compose/environment-variables/set-environment-variables/

services:

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: jobops
      POSTGRES_USER: jobops
      POSTGRES_PASSWORD: jobops
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobops"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    # Use env_file so secrets like OPENAI_API_KEY are read verbatim from .env.
    # Do NOT use ${OPENAI_API_KEY:-} in environment: — empty compose substitution clears the value.
    env_file:
      - path: .env
        required: false
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/jobops
      SPRING_DATASOURCE_USERNAME: jobops
      SPRING_DATASOURCE_PASSWORD: jobops
      JOBOPS_FILE_STORAGE_ROOT: /var/lib/jobops/storage
    volumes:
      - jobops_storage:/var/lib/jobops/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:8080/actuator/health >/dev/null || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 90s

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  pgdata:
  jobops_storage:
